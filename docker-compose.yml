# Local development stack: Phoenix app + PostgreSQL.
#
#   docker compose up --build
#
# App runs at http://localhost:4000 and waits for PostgreSQL healthcheck before boot.
# If you already run Postgres on 5432, change the left-hand port (e.g. "5433:5432")
# and set `DATABASE_PORT` in your local env file if needed.

name: owlgate

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MIX_ENV: dev
      PHX_SERVER: "true"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: owlgate_dev
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - deps:/app/deps
      - build:/app/_build

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: owlgate_dev
    volumes:
      - owlgate_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  owlgate_postgres:
    name: owlgate_postgres_data
  deps:
    name: owlgate_mix_deps
  build:
    name: owlgate_mix_build
